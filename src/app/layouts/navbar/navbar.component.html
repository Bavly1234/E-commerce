<nav class="sticky top-0 z-50 w-full bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">

  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3">

    <!-- LOGO -->
    <a routerLink="/" class="flex items-center gap-2">
      <img src="/assets/fresh-logo.svg" class="h-8" />
    </a>

    <!-- SEARCH -->
    <div class="hidden lg:block flex-1 max-w-md mx-6">
      <div class="relative">
        <input
          type="text"
          placeholder="Search products..."
          class="w-full rounded-full border border-gray-200 bg-gray-50 px-5 py-2 pr-10
                 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none"
        />

        <i class="fas fa-search absolute right-4 top-3 text-gray-400"></i>
      </div>
    </div>

    <!-- LINKS -->
    <div class="hidden md:flex items-center gap-6 font-medium text-gray-700">

      <a routerLink="/" routerLinkActive="text-emerald-600" class="hover:text-emerald-600">
        Home
      </a>

      <a routerLink="/shop" routerLinkActive="text-emerald-600" class="hover:text-emerald-600">
        Shop
      </a>

  <!-- DROPDOWN -->
<div class="relative group">

  <button class="hover:text-emerald-600 flex items-center gap-1">
    Categories
    <i class="fas fa-chevron-down text-xs group-hover:rotate-180 transition"></i>
  </button>

  <div
    class="absolute left-0 mt-2 w-64 bg-white border border-gray-100 rounded-xl shadow-xl
           opacity-0 invisible group-hover:opacity-100 group-hover:visible
           transition-all duration-200 max-h-80 overflow-auto">

    <ul class="py-2 text-sm">

      <li>
        <a routerLink="/categories"
           class="block px-4 py-2 font-semibold hover:bg-emerald-50">
          All Categories
        </a>
      </li>

      @for (cat of categories(); track cat._id) {
        <li>
          <a
            [routerLink]="['/categories', cat._id]"
            class="flex items-center gap-2 px-4 py-2 hover:bg-emerald-50 hover:text-emerald-600">

            <img [src]="cat.image"
                 class="w-6 h-6 object-contain rounded" />

            {{ cat.name }}
          </a>
        </li>
      }

    </ul>

  </div>
</div>

      <a routerLink="/brands" routerLinkActive="text-emerald-600" class="hover:text-emerald-600">
        Brands
      </a>

    </div>

    <!-- ICONS -->
    <div class="flex items-center gap-3">

      <!-- WISHLIST -->
      <button routerLink="/wishlist"
        class="relative p-2 rounded-full hover:bg-gray-100 transition">
        <i class="far fa-heart text-lg"></i>
      </button>

      <!-- CART -->
      <button routerLink="/cart"
        class="relative p-2 rounded-full hover:bg-gray-100 transition">

        <i class="fas fa-shopping-cart text-lg"></i>

        <span
          class="absolute -top-1 -right-1 bg-emerald-600 text-white text-[10px]
                 w-5 h-5 flex items-center justify-center rounded-full">
          {{ count() }}
        </span>

      </button>

      <!-- AUTH -->
      @if (logged()) {
        <button (click)="logOut()"
          class="text-sm font-medium text-gray-700 hover:text-red-500">
          Logout
        </button>
      } @else {
        <a routerLink="/login" class="text-sm hover:text-emerald-600">Login</a>
      }

      <!-- MOBILE -->
      <button class="md:hidden p-2">
        <i class="fas fa-bars text-xl"></i>
      </button>

    </div>

  </div>
</nav>
